<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReturnIt - Homepage</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Hero Section -->
    <section id="hero">
        <h1>Welcome to ReturnIt</h1>
        <p>Your go-to platform for hassle-free returns!</p>
        <a href="#registration-form">Get Started</a>
    </section>

    <!-- How It Works -->
    <section id="how-it-works">
        <h2>How It Works</h2>
        <div class="step">
            <h3>Step 1</h3>
            <p>Sign up for an account.</p>
        </div>
        <div class="step">
            <h3>Step 2</h3>
            <p>Request a return.</p>
        </div>
        <div class="step">
            <h3>Step 3</h3>
            <p>Send your items back!</p>
        </div>
    </section>

    <!-- Privacy Section -->
    <section id="privacy">
        <h2>Privacy Policy</h2>
        <p>Your privacy is important to us. We ensure your data is safe and secure.</p>
    </section>

    <!-- Registration Form -->
    <section id="registration-form">
        <h2>Register Now</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <button type="submit">Submit</button>
        </form>
    </section>

</body>
</html>
